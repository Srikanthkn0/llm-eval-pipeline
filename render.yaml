# Render backend — see DEPLOYMENT.md

services:
  - type: web
    name: llm-eval-pipeline-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: LLM Eval Pipeline API
      - key: FRONTEND_ORIGINS
        value: https://llm-eval-pipeline.vercel.app,http://localhost:5173
      - key: ALLOW_MOCK_MODEL
        value: "true"
      - key: API_KEY
        sync: false
      - key: REQUIRE_API_KEY
        value: "false"
      - key: MAX_EVAL_ROWS
        value: "500"
      - key: MAX_CONCURRENT_JOBS
        value: "3"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false