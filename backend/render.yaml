# Render Blueprint — Web Service with persistent storage for SQLite
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: llm-eval-pipeline-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: FRONTEND_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: eval-data
      mountPath: /var/data
      sizeGB: 1