# Render Blueprint — free tier (no persistent disk; sample dataset auto-seeds on startup)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: llm-eval-pipeline-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false