# Render Blueprint — production settings (free tier)
# Use GEMINI_API_KEY on Render (Groq blocks many cloud IPs via Cloudflare).

services:
  - type: web
    name: llm-eval-pipeline-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGINS
        value: https://llm-eval-pipeline.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false